<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - AutoPredict AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container py-5">

    <div class="predict-card mx-auto" style="max-width:500px;">

        <h2 class="gold text-center mb-4">
            Admin Login
        </h2>

        <div class="alert alert-warning">
            <strong>Demo-Zugangsdaten:</strong><br>
            Benutzername: <strong>admin</strong><br>
            Passwort: <strong>1234</strong>
        </div>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <label>Benutzername</label>
            <input class="form-control mb-3" type="text" name="username" required>

            <label>Passwort</label>
            <input class="form-control mb-4" type="password" name="password" required>

            <button class="btn btn-gold w-100" type="submit">
                Einloggen
            </button>

        </form>

        <div class="text-center mt-4">
            <a href="/" class="email-link">
                Zurück zur Startseite
            </a>
        </div>

    </div>

</div>

</body>
</html>
