<!DOCTYPE html>
<html>
<head>
    <title>Kundenzufriedenheit vorhersagen - AutoPredict AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container py-5">

    <header class="site-header">
        <div class="logo">
            <span class="gold">Auto</span>Predict AI
        </div>

        <nav class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Startseite</a>
            <a href="/predict" class="{% if request.path == '/predict' %}active{% endif %}">Preis vorhersagen</a>
            <a href="/satisfaction" class="{% if request.path == '/satisfaction' %}active{% endif %}">Zufriedenheit vorhersagen</a>
            <a href="/contact" class="{% if request.path == '/contact' %}active{% endif %}">Kontakt</a>
        </nav>
    </header>

    <div class="row align-items-center mb-5">
        <div class="col-lg-6">
            <h1 class="display-2 fw-bold">
                Kundenzufriedenheit <span class="gold">vorhersagen</span>
            </h1>
            <p class="lead">KI-gestützte Einschätzung der Kundenzufriedenheit</p>
        </div>

        <div class="col-lg-6 text-center">
            <img src="{{ url_for('static', filename='images/333.png') }}" class="img-fluid">
        </div>
    </div>

    <div class="predict-card">
        <h3 class="gold mb-4">Fahrzeugdaten</h3>

        <form id="satisfactionForm" class="row g-4">

            <div class="col-md-6">
                <label>Marke</label>
                <select class="form-select" name="marke" id="markeSelect" required>
                    <option value="Audi">Audi</option>
                    <option value="Bmw">BMW</option>
                    <option value="Mercedes-Benz">Mercedes-Benz</option>
                    <option value="Opel">Opel</option>
                    <option value="Volkswagen">Volkswagen</option>
                </select>
            </div>

            <div class="col-md-6">
                <label>Modell</label>
                <select class="form-select" name="modell" id="modellSelect" required></select>
            </div>

            <div class="col-md-4">
                <label>Kraftstoff</label>
                <select class="form-select" name="kraftstoff" required>
                    <option value="Benzin">Benzin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Elektro">Elektro</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>

            <div class="col-md-4">
                <label>Getriebe</label>
                <select class="form-select" name="getriebe" required>
                    <option value="Automatik">Automatik</option>
                    <option value="Manuell">Manuell</option>
                </select>
            </div>

            <div class="col-md-4">
                <label>Hubraum (L)</label>
                <input class="form-control" type="number" step="0.1" name="hubraum_l" value="2.0" required>
            </div>

            <div class="col-12">
                <button class="btn btn-gold btn-lg w-100" type="submit">
                    Zufriedenheit vorhersagen
                </button>
            </div>

        </form>
    </div>

    <div class="result-box">
        <h3>Predicted Kundenzufriedenheit</h3>
        <div id="satisfactionResult" class="price">-</div>
        <p id="satisfactionProbability" class="satisfaction-probability"></p>
    </div>

</div>

<footer class="footer">
    <p>AutoPredict AI © 2026</p>
    <p>Machine-Learning-Plattform zur Fahrzeugbewertung</p>
</footer>

<script>
const modelleNachMarke = {
    "Audi": ["A4", "A6", "Q5"],
    "Bmw": ["5Er", "I4", "X5"],
    "Mercedes-Benz": ["C-Klasse", "E-Klasse", "Glc", "Eqe"],
    "Opel": ["Astra", "Corsa", "Mokka", "Grandland"],
    "Volkswagen": ["Golf", "Passat", "Tiguan", "Id.4"]
};

function fillModelle() {
    const markeSelect = document.getElementById("markeSelect");
    const modellSelect = document.getElementById("modellSelect");

    const selectedMarke = markeSelect.value;
    const modelle = modelleNachMarke[selectedMarke];

    modellSelect.innerHTML = "";

    modelle.forEach(function(modell) {
        const option = document.createElement("option");
        option.value = modell;
        option.textContent = modell;
        modellSelect.appendChild(option);
    });
}

document.getElementById("markeSelect").addEventListener("change", fillModelle);
fillModelle();

document.getElementById("satisfactionForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const data = {
        marke: document.querySelector('[name="marke"]').value,
        modell: document.querySelector('[name="modell"]').value,
        kraftstoff: document.querySelector('[name="kraftstoff"]').value,
        getriebe: document.querySelector('[name="getriebe"]').value,
        hubraum_l: parseFloat(document.querySelector('[name="hubraum_l"]').value)
    };

    const response = await fetch("/api/predict-satisfaction", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.status === "success") {
        document.getElementById("satisfactionResult").innerHTML =
            result.predicted_satisfaction_label;

        if (result.satisfaction_probability_percent !== null) {
            document.getElementById("satisfactionProbability").innerHTML =
                "Wahrscheinlichkeit für zufrieden: " +
                Number(result.satisfaction_probability_percent).toFixed(2) + "%";
        } else {
            document.getElementById("satisfactionProbability").innerHTML = "";
        }
    } else {
        document.getElementById("satisfactionResult").innerHTML = "Fehler";
        document.getElementById("satisfactionProbability").innerHTML =
            result.message || "Vorhersage failed";
    }
});
</script>

</body>
</html>
